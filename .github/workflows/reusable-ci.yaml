name: Reusable CI

on:
  workflow_call:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true
          cache: true

      - name: Unit Test
        run: mise unit-tests

      - name: Build
        run: mise build
