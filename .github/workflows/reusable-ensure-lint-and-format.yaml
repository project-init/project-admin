name: Reusable Ensure Lint and Format

on:
  workflow_call:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true
          cache: true

      - name: Format
        run: mise format

      - name: Git Diff
        run: git diff --exit-code
